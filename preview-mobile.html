<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Preview — Mobile Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',system-ui,sans-serif; background:#0c0c0e; color:#f4f4f5; }
  .scroll-container { position:relative; height:600vh; }
  .sticky-video {
    position:sticky;
    top:0;
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#0c0c0e;
  }
  video {
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .overlay {
    position:fixed;
    top:0; left:0; right:0;
    z-index:10;
    padding:1rem;
    background:linear-gradient(180deg, rgba(12,12,14,0.8) 0%, transparent 100%);
  }
  .overlay h1 {
    font-size:1.25rem;
    font-weight:700;
    margin-bottom:0.25rem;
  }
  .overlay p {
    font-size:0.75rem;
    color:#10b981;
  }
  .hero-text {
    position:fixed;
    bottom:0; left:0; right:0;
    z-index:10;
    padding:2rem;
    background:linear-gradient(0deg, rgba(12,12,14,0.9) 0%, transparent 100%);
    pointer-events:none;
    transition: opacity 0.3s;
  }
  .hero-text h2 {
    font-size:clamp(1.75rem, 6vw, 2.5rem);
    font-weight:800;
    line-height:1.1;
    margin-bottom:0.5rem;
  }
  .hero-text p {
    font-size:0.9rem;
    color:#a1a1aa;
    max-width:30ch;
  }
  .hero-text a {
    display:inline-flex;
    align-items:center;
    gap:0.4rem;
    margin-top:1rem;
    padding:0.75rem 1.5rem;
    background:#10b981;
    color:#0c0c0e;
    font-weight:600;
    font-size:0.875rem;
    border-radius:9999px;
    text-decoration:none;
    pointer-events:auto;
  }
  .pct {
    position:fixed;
    bottom:1rem;
    right:1rem;
    z-index:20;
    font-size:0.6875rem;
    color:#71717a;
    font-variant-numeric:tabular-nums;
  }
</style>
</head>
<body>
<div class="overlay">
  <h1>Preview Mobile</h1>
  <p>MP4 scroll-driven — 1.6 MB vs 12 MB frames</p>
</div>

<div class="hero-text" id="heroText">
  <h2>O Seu Stand<br>Merece Lotar</h2>
  <p>Trafego pago, automacao com IA e funis de venda para stands automoveis em Portugal.</p>
  <a href="/contacto.html">Fale Connosco</a>
</div>

<div class="pct" id="pct">0%</div>

<div class="scroll-container">
  <div class="sticky-video">
    <video id="vid" muted playsinline preload="auto">
      <source src="showroom-mobile.mp4" type="video/mp4">
    </video>
  </div>
</div>

<script>
(function(){
  const vid = document.getElementById('vid');
  const hero = document.getElementById('heroText');
  const pctEl = document.getElementById('pct');

  // Ensure video is loaded
  vid.play().then(function(){ vid.pause(); vid.currentTime = 0; }).catch(function(){});

  let ticking = false;
  window.addEventListener('scroll', function(){
    if(!ticking){
      ticking = true;
      requestAnimationFrame(function(){
        const scrollTop = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const pct = Math.min(scrollTop / maxScroll, 1);

        if(vid.duration){
          vid.currentTime = pct * vid.duration;
        }

        // Fade hero text after 15%
        hero.style.opacity = pct < 0.15 ? 1 : Math.max(0, 1 - (pct - 0.15) / 0.1);

        pctEl.textContent = Math.round(pct * 100) + '%';
        ticking = false;
      });
    }
  }, {passive:true});
})();
</script>
</body>
</html>
